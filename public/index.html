    /* ======== Lead CAPTURE MODAL STYLES - CROCASE IDENTITY ======== */
    :root {
      --lead-bg: #f8fafc;
      --lead-surface: #ffffff;

      --lead-accent-dark: #7ab32f;
      --lead-text: #1a202c;

    .lead-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .lead-modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .lead-modal-container {
      background: linear-gradient(135deg, var(--lead-surface) 0%, var(--lead-bg) 100%);
      border: 1px solid rgba(140, 198, 63, 0.2);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12),

      max-width: 520px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.92) translateY(30px);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: scale(0.92) translateY(40px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }

      letter-spacing: 0.08em;
      text-transform: uppercase;

    .lead-modal-close {

    .lead-modal-close:hover {

    .lead-modal-title {

  <!-- LEAD CAPTURE MODAL -->

  <!-- LEAD MODAL SCRIPT -->
  <script>
    (function() {
      const modal = document.getElementById('leadModal');
      const closeBtn = document.getElementById('closeLeadModal');
      const form = document.getElementById('leadForm');
      const successMsg = document.getElementById('successMessage');

      // Abrir modal ao carregar a página
      window.addEventListener('load', function() {
        setTimeout(function() {
          modal.classList.add('active');
        }, 500);
      });

      // Fechar modal ao clicar no botão X
      closeBtn.addEventListener('click', function() {
        modal.classList.remove('active');
      });

      // Fechar modal ao clicar fora (no overlay)
      modal.addEventListener('click', function(e) {
        if (e.target === modal) {
          modal.classList.remove('active');
        }
      });

      // Fechar com tecla ESC
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && modal.classList.contains('active')) {
          modal.classList.remove('active');
        }
      });

      // Controlar envio do formulário
      form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const submitBtn = form.querySelector('.lead-form-submit');
        const originalText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = 'Enviando...';

        // Coletar dados
        const formData = {
          name: document.getElementById('modalName').value,
          email: document.getElementById('modalEmail').value,
          phone: document.getElementById('modalPhone').value,
          message: document.getElementById('modalObjective').value
        };

        try {
          // Enviar para API do Google Sheets
          const response = await fetch('https://seu-dominio.com/forms/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
          });

          const result = await response.json();

          if (response.ok && result.success) {
            // Mostrar mensagem de sucesso
            successMsg.classList.add('show');
            form.style.opacity = '0.3';

            // Resetar após 2 segundos
            setTimeout(function() {
              form.reset();
              form.style.opacity = '1';
              successMsg.classList.remove('show');
              submitBtn.disabled = false;
              submitBtn.textContent = originalText;
              modal.classList.remove('active');
            }, 2000);
          } else {
            throw new Error(result.message || 'Erro ao enviar formulário');
          }
        } catch (error) {
          console.error('Erro ao enviar form:', error);
          alert('Erro ao enviar dados. Tente novamente.');
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      });
    })();
  </script>
